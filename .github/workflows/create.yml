name: Build Texture Pack

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Get version from pack.json
        id: version
        run: |
          VERSION=$(jq -r '.version' pack.json)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag=v$VERSION" >> $GITHUB_OUTPUT
          NAME=$(jq -r '.name' pack.json)
          echo "name=$NAME" >> $GITHUB_OUTPUT

      - name: Get changelog for this version
        id: changelog
        run: |
          VERSION=${{ steps.version.outputs.version }}
          CHANGELOG=$(jq -r --arg v "$VERSION" '.[$v][]' changelog.json | sed 's/^/- /')
          echo "log<<EOF" >> $GITHUB_OUTPUT
          echo "$CHANGELOG" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create ZIP file
        run: |
          mkdir temp_pack

          rsync -av . temp_pack \
            --exclude ".git" \
            --exclude ".vscode" \
            --exclude "schema.json" \
            --exclude "temp_pack" \
            --exclude ".github" \
            --exclude "changelog.json" \
            --exclude "README.md"
          cd temp_pack
          zip -r ../Texture-Pack.zip .
          cd ..
          rm -rf temp_pack

      - name: Create Tag
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git tag ${{ steps.version.outputs.tag }}
          git push origin ${{ steps.version.outputs.tag }}

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: Release v${{ steps.version.outputs.version }}
          body: |
            # Changelog
            ${{ steps.changelog.outputs.log }}
          files: ${{ steps.version.outputs.name }}.zip